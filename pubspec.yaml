name: elite_edition
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.1+2

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  get: ^4.6.6
  http: ^1.2.2
  cached_network_image: ^3.4.1
  flutter_file_dialog: ^3.0.2
  path_provider: ^2.1.4
  path: ^1.9.0
  image: ^4.2.0
  lazy_load_scrollview: ^1.3.0
  flutter_expandable_fab: ^2.3.0
  flutter_date_range_picker: ^0.1.1
  cross_scroll: ^0.1.1
  pdf: ^3.11.1
  flutter_pdfview: ^1.3.4
  share_plus: ^10.1.2
  connectivity_plus: ^6.1.0
  mobile_scanner: ^7.2.0
  dropdown_search: ^7.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

  flutter_lints: ^3.0.0

flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/icons/
    - assets/fonts/Roboto-Bold.ttf
    - assets/fonts/Roboto-Regular.ttf

  fonts:
    - family: Futura
      fonts:
        - asset: assets/fonts/FuturaCyrillicBold.ttf
          weight: 800
        - asset: assets/fonts/FuturaCyrillicBook.ttf
          weight: 400
        - asset: assets/fonts/FuturaCyrillicDemi.ttf
          weight: 600
        - asset: assets/fonts/FuturaCyrillicExtraBold.ttf
          weight: 900
        - asset: assets/fonts/FuturaCyrillicLight.ttf
          weight: 300
        - asset: assets/fonts/FuturaCyrillicMedium.ttf
          weight: 500
        - asset: assets/fonts/FuturaCyrillicHeavy.ttf
          weight: 700

  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
